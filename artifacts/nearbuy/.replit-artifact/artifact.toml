kind = "mobile"
previewPath = "/"
title = "NearBuy"
version = "1.0.0"
id = "artifacts/nearbuy-business"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20248

[services.development]
run = "pnpm --filter @workspace/nearbuy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nearbuy", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nearbuy", "run", "serve" ]

[services.env]
PORT = "20248"
BASE_PATH = "/"

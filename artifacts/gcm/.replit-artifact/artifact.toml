kind = "web"
previewPath = "/gcm/"
title = "GCM — Game Center Manager"
version = "1.0.0"
id = "artifacts/gcm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/gcm/" ]
localPort = 20719

[services.development]
run = "pnpm --filter @workspace/gcm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gcm", "run", "build" ]
publicDir = "artifacts/gcm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20719"
BASE_PATH = "/gcm/"

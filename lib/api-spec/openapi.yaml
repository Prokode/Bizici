openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: NearBuy Business API (MongoDB-backed)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: me
  - name: shops
  - name: products
  - name: requests
  - name: members
  - name: categories
  - name: discounts
  - name: chat
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [me]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }

  /me/push-tokens:
    post:
      operationId: registerPushToken
      tags: [me]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushTokenInput" }
      responses:
        "204":
          description: Token registered (or refreshed) for the current user
    delete:
      operationId: unregisterPushToken
      tags: [me]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string, minLength: 1 }
              required: [token]
      responses:
        "204":
          description: Token removed (no-op if it did not belong to user)

  /me/basket:
    get:
      operationId: getMyBasket
      tags: [me]
      responses:
        "200":
          description: Current user's course basket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Basket" }

  /me/basket/items:
    post:
      operationId: addBasketItem
      tags: [me]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BasketItemInput" }
      responses:
        "200":
          description: Updated basket
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Basket" }

  /me/basket/items/{itemId}:
    delete:
      operationId: removeBasketItem
      tags: [me]
      parameters:
        - in: path
          name: itemId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Item removed (no-op if not present)

  /me/basket/clear:
    post:
      operationId: clearBasket
      tags: [me]
      responses:
        "204":
          description: All basket items removed

  /me/basket/start-course:
    post:
      operationId: startCourse
      tags: [me]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CourseStartInput" }
      responses:
        "200":
          description: Ordered list of stops (one per basket item)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CoursePlan" }

  /me/reviews/{shopId}:
    get:
      operationId: getMyReview
      tags: [me]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: The current user's review of this shop, or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ShopReview"
                  - type: "null"
    post:
      operationId: upsertMyReview
      tags: [me]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShopReviewInput" }
      responses:
        "200":
          description: The created or updated review
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShopReview" }
    delete:
      operationId: deleteMyReview
      tags: [me]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "204":
          description: Review removed (no-op if it didn't exist)

  /shops:
    get:
      operationId: listShops
      tags: [shops]
      responses:
        "200":
          description: Shop list with role
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShopWithRole" }
    post:
      operationId: createShop
      tags: [shops]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShopCreateInput" }
      responses:
        "200":
          description: Created shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shop" }

  /shops/{shopId}:
    get:
      operationId: getShop
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shop" }
    put:
      operationId: updateShop
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShopUpdateInput" }
      responses:
        "200":
          description: Updated shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shop" }

  /shops/{shopId}/open:
    patch:
      operationId: setShopOpen
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShopOpenInput" }
      responses:
        "200":
          description: Updated shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Shop" }

  /shops/{shopId}/qr:
    get:
      operationId: getShopQr
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: QR payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QrPayload" }

  /shops/{shopId}/summary:
    get:
      operationId: getShopSummary
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /shops/{shopId}/dashboard:
    get:
      operationId: getShopDashboard
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Mini dashboard metrics for the shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShopDashboard" }

  /shops/{shopId}/kyc/status:
    get:
      operationId: getShopKycStatus
      tags: [kyc]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: KYC status for the shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KycStatusResponse" }

  /shops/{shopId}/kyc/submit:
    post:
      operationId: submitShopKyc
      tags: [kyc]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KycSubmitBody" }
      responses:
        "200":
          description: KYC submitted, status set to pending
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KycStatusResponse" }

  /shops/{shopId}/products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Product" }
    post:
      operationId: createProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductCreateInput" }
      responses:
        "200":
          description: Created product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }

  /shops/{shopId}/products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductUpdateInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Product" }
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteResult" }

  /shops/{shopId}/products/analyze-photo:
    post:
      operationId: analyzeProductPhoto
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnalyzePhotoInput" }
      responses:
        "200":
          description: AI suggestions
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductSuggestion" }

  /shops/{shopId}/products/{productId}/discounts:
    get:
      operationId: listDiscounts
      tags: [discounts]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Discount" }
    post:
      operationId: createDiscount
      tags: [discounts]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: productId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DiscountCreateInput" }
      responses:
        "200":
          description: Created discount
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Discount" }

  /shops/{shopId}/products/{productId}/discounts/{discountId}:
    delete:
      operationId: deleteDiscount
      tags: [discounts]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: productId
          required: true
          schema: { type: string }
        - in: path
          name: discountId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteResult" }

  /shops/{shopId}/services:
    get:
      operationId: listShopServices
      tags: [services]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Service list for the shop
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Service" }
    post:
      operationId: createService
      tags: [services]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceCreateInput" }
      responses:
        "200":
          description: Created service
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }

  /shops/{shopId}/services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceUpdateInput" }
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }
    delete:
      operationId: deleteService
      tags: [services]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteResult" }

  /shops/{shopId}/provider-profile:
    get:
      operationId: getProviderProfile
      tags: [services]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Provider profile of the shop
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceProviderProfile" }
    patch:
      operationId: updateProviderProfile
      tags: [services]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ServiceProviderProfileInput" }
      responses:
        "200":
          description: Updated provider profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceProviderProfile" }

  /services/search:
    get:
      operationId: searchServices
      tags: [services]
      parameters:
        - in: query
          name: latitude
          required: true
          schema: { type: number }
        - in: query
          name: longitude
          required: true
          schema: { type: number }
        - in: query
          name: radiusKm
          required: false
          schema: { type: number, minimum: 0.1, maximum: 100 }
          description: Search radius in kilometers (defaults to 10).
        - in: query
          name: categoryId
          required: false
          schema: { type: string }
        - in: query
          name: q
          required: false
          schema: { type: string, maxLength: 120 }
          description: Free-text search on title, description, tags.
        - in: query
          name: serviceLocation
          required: false
          schema:
            type: string
            enum: [at_shop, at_customer, both]
          description: |
            Restrict to services that can be performed in this mode.
            Matches `at_customer` returns providers that go to the customer
            (effective location is `at_customer` or `both`); matches
            `at_shop` returns providers the customer can visit (effective
            location is `at_shop` or `both`); matches `both` only returns
            providers that explicitly support both modes.
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: Services matching the geo + filters
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ServiceSearchResult" }

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Service" }

  /shops/{shopId}/requests:
    get:
      operationId: listNearbyRequests
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Active broadcast requests near shop
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BroadcastRequest" }

  /shops/{shopId}/requests/{id}/found:
    post:
      operationId: markRequestFound
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BroadcastRequest" }

  /shops/{shopId}/requests/{id}/expire:
    post:
      operationId: expireRequest
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BroadcastRequest" }

  /shops/{shopId}/members:
    get:
      operationId: listShopMembers
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Members and pending invitations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShopMembersList" }
    post:
      operationId: inviteShopMember
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteMemberInput" }
      responses:
        "200":
          description: Created invitation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShopInvitation" }

  /shops/{shopId}/members/{userId}:
    delete:
      operationId: removeShopMember
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteResult" }

  /shops/{shopId}/invitations/{invitationId}:
    delete:
      operationId: cancelShopInvitation
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: invitationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeleteResult" }

  /invitations:
    get:
      operationId: listMyInvitations
      tags: [members]
      responses:
        "200":
          description: List of pending invitations for current user
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PendingInvitation" }

  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [members]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Accepted; returns shop with role
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShopWithRole" }

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      parameters:
        - in: query
          name: kind
          required: false
          schema:
            type: string
            enum: [product, service]
          description: Optionally filter by category kind.
      responses:
        "200":
          description: All categories (optionally filtered by kind).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Category" }

  /conversations:
    get:
      operationId: listConversations
      tags: [chat]
      responses:
        "200":
          description: User's conversations (as customer or as seller of any of their shops)
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items: { $ref: "#/components/schemas/ChatConversation" }
                required: [conversations]
    post:
      operationId: createConversation
      tags: [chat]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatConversationCreateInput" }
      responses:
        "200":
          description: Idempotent get-or-create as customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation: { $ref: "#/components/schemas/ChatConversation" }
                required: [conversation]

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation: { $ref: "#/components/schemas/ChatConversation" }
                required: [conversation]

  /conversations/{id}/messages:
    get:
      operationId: listConversationMessages
      tags: [chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: before
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Page of messages (oldest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/ChatMessage" }
                  hasMore: { type: boolean }
                required: [messages, hasMore]
    post:
      operationId: postConversationMessage
      tags: [chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatMessageCreateInput" }
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { $ref: "#/components/schemas/ChatMessage" }
                required: [message]

  /conversations/{id}/read:
    post:
      operationId: markConversationRead
      tags: [chat]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reset current side's unread counter
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

components:
  parameters:
    ShopId:
      in: path
      name: shopId
      required: true
      schema: { type: string }

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Me:
      type: object
      properties:
        id: { type: string }
        email: { type: string, nullable: true }
        name: { type: string, nullable: true }
        shops:
          type: array
          items: { $ref: "#/components/schemas/ShopWithRole" }
      required: [id, shops]

    PushTokenInput:
      type: object
      properties:
        token:
          type: string
          minLength: 1
          description: Expo push token returned by expo-notifications.
        platform:
          type: string
          enum: [ios, android, web]
      required: [token, platform]

    BasketItem:
      type: object
      properties:
        id: { type: string }
        query: { type: string, maxLength: 120 }
        addedAt: { type: string, format: date-time }
      required: [id, query, addedAt]

    Basket:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/BasketItem" }
      required: [items]

    BasketItemInput:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 120
          description: Free-text product the customer wants to find on their course.
      required: [query]

    CourseStartInput:
      type: object
      properties:
        lat: { type: number }
        lng: { type: number }
        radiusKm:
          type: number
          minimum: 0.5
          maximum: 50
          default: 5
      required: [lat, lng]

    CourseStopShop:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        marketName: { type: string, nullable: true }
        latitude: { type: number }
        longitude: { type: number }
        isOpen: { type: boolean }
        distanceMeters: { type: integer, minimum: 0 }
      required:
        - id
        - name
        - latitude
        - longitude
        - isOpen
        - distanceMeters

    CourseStopProduct:
      type: object

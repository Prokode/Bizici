          oneOf:
            - $ref: "#/components/schemas/CourseStopShop"
            - type: "null"
          description: Nearest in-radius shop carrying a matching product, or null when none was found.
        products:
          type: array
          items: { $ref: "#/components/schemas/CourseStopProduct" }
      required: [itemId, query, nearestShop, products]

    CoursePlan:
      type: object
      properties:
        stops:
          type: array
          items: { $ref: "#/components/schemas/CourseStop" }
      required: [stops]

    Shop:
      type: object
      properties:
        id: { type: string }
        sellerId: { type: string }
        name: { type: string }
        marketName: { type: string, nullable: true }
        stallInfo: { type: string, nullable: true }
        latitude: { type: number }
        longitude: { type: number }
        isOpen: { type: boolean }
        kind:
          type: string
          enum: [products, services, hybrid]
          description: |
            Whether this shop sells products, offers services, or both.
            Existing shops default to "products".
        serviceProvider:
          oneOf:
            - { $ref: "#/components/schemas/ServiceProviderProfile" }
            - { type: "null" }
          description: |
            Embedded provider profile, only meaningful when kind is
            "services" or "hybrid". May be a near-empty object when the
            shop was just created and the profile not yet filled in.
        ratingAvg:
          type: number
          minimum: 0
          maximum: 5
          description: Mean rating across all reviews (0 when none).
        ratingCount:
          type: integer
          minimum: 0
          description: Number of reviews used for the average.
        kyc:
          $ref: "#/components/schemas/ShopKyc"
        fulfillment:
          $ref: "#/components/schemas/ShopFulfillment"
        deliveryRadiusKm:
          type: number
          nullable: true
          minimum: 1
          maximum: 100
          description: |
            Optional delivery radius in km. Only meaningful when
            fulfillment is "delivery_only" or "both".
        distanceKm:
          type: number
          nullable: true
          description: |
            Distance from the search origin in kilometers. Only present
            on results returned by geo search endpoints.
      required:
        - id
        - sellerId
        - name
        - latitude
        - longitude
        - isOpen
        - kind
        - ratingAvg
        - ratingCount
        - fulfillment

    KycStatus:
      type: string
      enum: [unsubmitted, pending, approved, rejected]
      description: |
        unsubmitted = no document uploaded yet, pending = awaiting admin
        review, approved = visible to customers, rejected = needs resubmit.

    KycDocumentType:
      type: string
      enum: [id_card, passport, driver_license]

    ShopKyc:
      type: object
      description: Embedded KYC status on a shop. Image data lives elsewhere.
      properties:
        status: { $ref: "#/components/schemas/KycStatus" }
        submittedAt: { type: string, format: date-time, nullable: true }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectionReason: { type: string, nullable: true }
      required: [status]

    KycStatusResponse:
      type: object

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NearBuy Business API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: me
    description: Current user
  - name: shops
    description: Shops the user owns or is a member of
  - name: products
    description: Product inventory (per shop)
  - name: requests
    description: Live broadcast requests near a shop
  - name: members
    description: Shop members and invitations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Current authenticated user with their shop memberships
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /shops:
    get:
      operationId: listShops
      tags: [shops]
      summary: List shops the current user owns or is assigned to
      responses:
        "200":
          description: Shop list with role
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShopWithRole"
    post:
      operationId: createShop
      tags: [shops]
      summary: Create a new shop (current user becomes seller)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopCreateInput"
      responses:
        "200":
          description: Created shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{shopId}:
    get:
      operationId: getShop
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
    put:
      operationId: updateShop
      tags: [shops]
      summary: Update shop details (seller only)
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopUpdateInput"
      responses:
        "200":
          description: Updated shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{shopId}/open:
    patch:
      operationId: setShopOpen
      tags: [shops]
      summary: Toggle whether the shop is open
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopOpenInput"
      responses:
        "200":
          description: Updated shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{shopId}/qr:
    get:
      operationId: getShopQr
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: QR payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QrPayload"

  /shops/{shopId}/summary:
    get:
      operationId: getShopSummary
      tags: [shops]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /shops/{shopId}/products:
    get:
      operationId: listProducts
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateInput"
      responses:
        "200":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /shops/{shopId}/products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /shops/{shopId}/products/analyze-photo:
    post:
      operationId: analyzeProductPhoto
      tags: [products]
      summary: Analyze a product photo and return suggested fields
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzePhotoInput"
      responses:
        "200":
          description: AI suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductSuggestion"

  /shops/{shopId}/requests:
    get:
      operationId: listNearbyRequests
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Active broadcast requests near shop
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BroadcastRequest"

  /shops/{shopId}/requests/{id}/found:
    post:
      operationId: markRequestFound
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastRequest"

  /shops/{shopId}/requests/{id}/expire:
    post:
      operationId: expireRequest
      tags: [requests]
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastRequest"

  /shops/{shopId}/members:
    get:
      operationId: listShopMembers
      tags: [members]
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Members and pending invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopMembersList"
    post:
      operationId: inviteShopMember
      tags: [members]
      summary: Invite a helper by email (seller only)
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberInput"
      responses:
        "200":
          description: Created invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopInvitation"

  /shops/{shopId}/members/{userId}:
    delete:
      operationId: removeShopMember
      tags: [members]
      summary: Remove a SubSeller from the shop (seller only)
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /shops/{shopId}/invitations/{invitationId}:
    delete:
      operationId: cancelShopInvitation
      tags: [members]
      summary: Cancel a pending invitation (seller only)
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - in: path
          name: invitationId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /invitations:
    get:
      operationId: listMyInvitations
      tags: [members]
      summary: Pending invitations addressed to current user's email
      responses:
        "200":
          description: List of pending invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PendingInvitation"

  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [members]
      summary: Accept an invitation token (creates shop membership)
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted; returns shop with role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopWithRole"

components:
  parameters:
    ShopId:
      in: path
      name: shopId
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Me:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        shops:
          type: array
          items:
            $ref: "#/components/schemas/ShopWithRole"
      required: [id, shops]

    Shop:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sellerId:
          type: string
          format: uuid
        name:
          type: string
        marketName:
          type: string
          nullable: true
        stallInfo:
          type: string
          nullable: true
        latitude:
          type: number
        longitude:
          type: number
        isOpen:
          type: boolean
      required:
        - id
        - sellerId
        - name
        - latitude
        - longitude
        - isOpen

    ShopWithRole:
      type: object
      properties:
        shop:
          $ref: "#/components/schemas/Shop"
        role:
          type: string
          enum: [seller, sub_seller]
      required: [shop, role]

    ShopCreateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        marketName:
          type: string
          nullable: true
        stallInfo:
          type: string
          nullable: true
        latitude:
          type: number
        longitude:
          type: number
      required: [name, latitude, longitude]

    ShopUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        marketName:
          type: string
          nullable: true
        stallInfo:
          type: string
          nullable: true
        latitude:
          type: number
        longitude:
          type: number

    ShopOpenInput:
      type: object
      properties:
        isOpen:
          type: boolean
      required: [isOpen]

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        stockStatus:
          type: string
          enum: [in_stock, out_of_stock]
        lastVerifiedAt:
          type: string
      required:
        - id
        - shopId
        - name
        - tags
        - stockStatus
        - lastVerifiedAt

    ProductCreateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          nullable: true
        price:
          type: number
          minimum: 0
          nullable: true
        tags:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        stockStatus:
          type: string
          enum: [in_stock, out_of_stock]
      required: [name]

    ProductUpdateInput:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          nullable: true
        price:
          type: number
          nullable: true
        tags:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        stockStatus:
          type: string
          enum: [in_stock, out_of_stock]

    AnalyzePhotoInput:
      type: object
      properties:
        imageBase64:
          type: string
      required: [imageBase64]

    ProductSuggestion:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        price:
          type: number
        tags:
          type: array
          items:
            type: string
      required: [name, category, price, tags]

    BroadcastRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        query:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        status:
          type: string
          enum: [active, found, expired]
        distanceMeters:
          type: number
      required:
        - id
        - query
        - latitude
        - longitude
        - status
        - distanceMeters

    QrPayload:
      type: object
      properties:
        url:
          type: string
        token:
          type: string
      required: [url, token]

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    DashboardSummary:
      type: object
      properties:
        totalProducts:
          type: integer
        inStockCount:
          type: integer
        outOfStockCount:
          type: integer
        activeRequestsCount:
          type: integer
      required: [totalProducts, inStockCount, outOfStockCount, activeRequestsCount]

    ShopMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [seller, sub_seller]
        createdAt:
          type: string
      required: [id, userId, role, createdAt]

    ShopInvitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [seller, sub_seller]
        createdAt:
          type: string
      required: [id, email, role, createdAt]

    ShopMembersList:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/ShopMember"
        invitations:
          type: array
          items:
            $ref: "#/components/schemas/ShopInvitation"
      required: [members, invitations]

    InviteMemberInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    PendingInvitation:
      type: object
      properties:
        token:
          type: string
        shopId:
          type: string
          format: uuid
        shopName:
          type: string
        role:
          type: string
          enum: [seller, sub_seller]
        invitedByName:
          type: string
          nullable: true
      required: [token, shopId, shopName, role]
